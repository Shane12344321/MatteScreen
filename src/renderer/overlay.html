<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        /* The window is click-through at the OS level, but be safe here too. */
        pointer-events: none;
        cursor: default;
      }

      /* Optional warm/cool wash painted under the grain. */
      #tint {
        position: fixed;
        inset: 0;
        opacity: 0;
        transition: opacity 200ms ease, background-color 200ms ease;
      }

      /* The procedural paper grain layer. */
      #grain {
        position: fixed;
        inset: 0;
        opacity: 0;
        mix-blend-mode: multiply;
        transition: opacity 200ms ease;
      }

      #grain svg {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="tint"></div>
    <div id="grain">
      <svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <defs>
          <filter id="paperFilter" x="0" y="0" width="100%" height="100%">
            <feTurbulence
              id="feTurb"
              type="fractalNoise"
              baseFrequency="0.9"
              numOctaves="2"
              stitchTiles="stitch"
              result="noise"
            />
            <feColorMatrix id="feSat" in="noise" type="saturate" values="0" />
          </filter>
        </defs>
        <rect width="100%" height="100%" filter="url(#paperFilter)" />
      </svg>
    </div>
    <script src="overlay.js"></script>
  </body>
</html>
